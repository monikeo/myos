<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyOS</title>
    
    <!-- Client-Side Content Security Policy (CSP) Hardening -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; connect-src 'self' wss: ws: https:; frame-src 'self' https://drive.google.com https://docs.google.com;" />
    
    <!-- PWA & Apple Standalone Meta Tags -->
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyOS" />
    
    <!-- Branding Favicons & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <script>
      (function() {
        try {
          var theme = localStorage.getItem("myos_theme") || "dark";
          var isDark = false;
          if (theme === "dark") {
            isDark = true;
          } else if (theme === "system") {
            isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          }
          if (isDark) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Service Worker registration for PWA installation and offline caching
      if ("serviceWorker" in navigator) {
        if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
          // Unregister service worker on localhost to prevent caching conflicts during development
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var registration of registrations) {
              registration.unregister();
              console.log("[PWA] Service Worker unregistered for local development");
            }
          });
        } else {
          window.addEventListener("load", () => {
            navigator.serviceWorker.register("/sw.js")
              .then((reg) => console.log("[PWA] Service Worker registered successfully:", reg.scope))
              .catch((err) => console.error("[PWA] Service Worker registration failed:", err));
          });
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
